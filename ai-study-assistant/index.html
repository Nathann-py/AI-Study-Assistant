<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Study Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>

    <div class="spinner"></div>
    <p>Generating summary...</p>
</div>

        <p id="summaryText">AI summary coming soon...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
